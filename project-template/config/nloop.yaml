version: 3

# Default workflow to use for new features
default_workflow: default

# Workflow mapping — select workflow based on ticket type/tags
# First match wins. If no match, uses default_workflow.
workflow_mapping:
  - match:
      tags: [hotfix, critical-fix]
    workflow: hotfix

  - match:
      tags: [bugfix, bug]
    workflow: bugfix

  - match:
      tags: [refactor, tech-debt, cleanup]
    workflow: refactor

  # Uncomment to match by ticket type (YouTrack field)
  # - match:
  #     type: [Bug]
  #   workflow: bugfix
  #
  # - match:
  #     type: [Task]
  #     tags: [refactor]
  #   workflow: refactor

# ─── Polling / YouTrack ─────────────────────────────────────
# NLoop builds the YouTrack query from the filters below.
# You can edit these with: /nloop-config polling
polling:
  enabled: true
  interval: 30m

  # Structured filters — NLoop builds the query automatically.
  # All filters are AND-combined. Arrays are OR within the same filter.
  filters:
    project: []             # e.g., ["MYPROJ", "BACKEND"]
    state: ["Open"]         # e.g., ["Open", "In Progress"]
    type: []                # e.g., ["Bug", "Feature", "Task"]
    priority: []            # e.g., ["Critical", "Major", "Normal"]
    tag: ["nloop"]          # e.g., ["nloop", "nloop-auto"]
    assignee: []            # e.g., ["john.doe", "Unassigned"]
    custom_fields: {}       # e.g., { "Sprint": "Sprint 42", "Team": "Backend" }

  # OR: raw YouTrack query (overrides filters above if not empty)
  youtrack_query: ""

# YouTrack status mapping — NLoop updates ticket status at key events
# Set to empty string to disable auto-update for that event
youtrack_status:
  on_start: "In Progress"
  on_complete: "Done"
  on_escalate: ""            # Don't change status on escalation (just add comment)
  on_fail: ""                # Don't change status on failure (just add comment)

# Model defaults per agent role
models:
  orchestrator: opus
  planner: sonnet
  architect: opus
  manager: sonnet
  developer: sonnet
  reviewer: sonnet
  tester: sonnet
  analyzer: sonnet
  documenter: sonnet

# Review defaults
review:
  max_rounds: 4
  escalation_action: pause  # pause | notify | skip

# Parallel execution
parallel:
  max_concurrent_agents: 3

# ─── Rate Limit Protection ──────────────────────────────────
# Prevents API rate limit errors when spawning many agents sequentially.
rate_limit:
  # Cooldown in seconds between sequential agent spawns
  cooldown_seconds: 10
  # Max retries when an agent fails due to rate limit
  max_retries: 3
  # Initial wait in seconds before first retry (doubles each retry: 30s, 60s, 120s)
  retry_backoff_seconds: 30

# ─── Git Platform ────────────────────────────────────────────
# Supported: github | bitbucket
# Only configure the platform you use.

git_platform: github  # github | bitbucket

# GitHub (used when git_platform: github)
github:
  # Uses `gh` CLI — must be authenticated: `gh auth login`
  default_reviewers: []
  base_branch: "main"
  draft: false          # Create as draft PR
  labels: []            # Labels to add to PR (e.g., ["enhancement", "nloop"])

  # Branch prefix per workflow type
  # The orchestrator picks the prefix based on the active workflow
  branch_prefix:
    default: "feature/"
    bugfix: "bugfix/"
    hotfix: "hotfix/"
    refactor: "refactor/"

# Bitbucket (used when git_platform: bitbucket)
bitbucket:
  base_url: ""
  workspace: ""
  repo: ""
  default_reviewers: []

  # Branch prefix per workflow type
  branch_prefix:
    default: "feature/"
    bugfix: "bugfix/"
    hotfix: "hotfix/"
    refactor: "refactor/"

# ─── Metrics ─────────────────────────────────────────────────
metrics:
  enabled: true
  # Where to store aggregated metrics across features
  history_file: ".nloop/metrics-history.jsonl"
  # Auto-generate post-mortem at end of each feature
  auto_post_mortem: true

# ─── Notifications ──────────────────────────────────────────
# Send webhook notifications at key pipeline events.
# Supports Slack, Discord, Teams, or any custom webhook URL.
notifications:
  enabled: false

  # Events that trigger notifications
  events:
    - workflow_started
    - workflow_completed
    - workflow_escalated
    - workflow_failed
    - pr_created

  # Slack incoming webhook
  # Create at: https://api.slack.com/messaging/webhooks
  slack:
    webhook_url: ""       # e.g., "https://hooks.slack.com/services/T00/B00/xxx"
    channel: ""           # Optional: override default channel
    mention_on_escalation: ""  # e.g., "@channel" or "<@U123456>"

  # Discord webhook
  # Create in: Server Settings → Integrations → Webhooks
  discord:
    webhook_url: ""       # e.g., "https://discord.com/api/webhooks/123/abc"

  # Microsoft Teams incoming webhook
  teams:
    webhook_url: ""       # e.g., "https://outlook.office.com/webhook/..."

  # Custom webhook (generic HTTP POST)
  # Receives JSON payload: { event, ticket_id, workflow, details, timestamp }
  custom:
    url: ""
    headers: {}           # Additional headers (e.g., { "Authorization": "Bearer xxx" })

# ─── Changelog ──────────────────────────────────────────────
changelog:
  enabled: true
  # Path to changelog file (relative to project root)
  file: "CHANGELOG.md"
  # Format: keepachangelog | conventional | simple
  format: "keepachangelog"

# ─── Help Center ────────────────────────────────────────────
# Auto-generate customer-facing help articles for new features.
# Articles are written in the configured language and saved as
# markdown files ready for your help center platform.
help_center:
  enabled: true
  # Where to save generated articles (relative to project root)
  output_dir: "docs/help"
  # Language for articles: pt-BR | en | es | etc.
  language: "pt-BR"
  # Tone: friendly | formal | technical
  tone: "friendly"
  # Default categories (used for organizing articles)
  categories:
    - "Primeiros Passos"
    - "Funcionalidades"
    - "Configuracoes"
    - "Integrações"
    - "FAQ"
    - "API"
  # Article status on creation: draft | published
  default_status: "draft"
  # Generate articles only for features with these tags (empty = all features)
  only_tags: []
  # Skip article generation for these tags
  skip_tags: ["refactor", "tech-debt", "backend-only", "no-docs"]

# ─── Skip Conditions ─────────────────────────────────────────
# Global skip conditions applied to all workflows.
# These supplement per-node skip_if in workflow YAML.
skip_conditions:
  # Skip QA visual testing for these tags
  qa_testing:
    skip_tags: [backend-only, no-ui, api-only, cli-only]
  # Skip plan+spec for these tags (use bugfix workflow instead)
  planning:
    skip_tags: [bugfix, hotfix]
  # Skip performance analysis for these tags
  perf_analysis:
    skip_tags: [docs-only, config-only, no-perf]
  # Skip docs update for these tags
  docs_update:
    skip_tags: [no-docs]

# Feature directory
features_dir: features
