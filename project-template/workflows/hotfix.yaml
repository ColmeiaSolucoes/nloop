name: hotfix
version: 2
description: Minimal workflow for critical hotfixes — straight to implementation with expedited review

defaults:
  max_review_rounds: 1
  timeout: 15m

nodes:
  brainstorm:
    agent: tech-leader
    action: brainstorm
    description: Quick root cause analysis and fix strategy
    produces: brainstorm.md

  task-planning:
    agent: project-manager
    action: create-tasks
    description: Create minimal fix task(s) from brainstorm analysis
    produces: tasks.md
    consumes:
      - brainstorm.md

  execute-tasks:
    agent: project-manager
    action: dispatch-tasks
    description: Single developer implements the fix
    consumes:
      - tasks.md
      - brainstorm.md

  code-review:
    agent: code-reviewer
    action: review-code
    target: code
    max_rounds: 1

  unit-testing:
    agent: unit-tester
    action: run-tests
    produces: test-report-unit.md

  bug-fixing:
    agent: tech-leader
    action: dispatch-fixes
    description: Fix any regressions
    consumes:
      - test-report-unit.md

  docs-update:
    agent: docs-writer
    action: update-docs
    description: Generate minimal changelog entry for the hotfix
    produces: docs-update.md
    consumes:
      - brainstorm.md
    skip_if:
      - tag: no-docs

  create-pr:
    agent: tech-leader
    action: create-pr
    description: Create PR for the hotfix

  post-mortem:
    agent: tech-leader
    action: post-mortem
    description: Generate metrics and lessons learned
    produces: post-mortem.md
    also_runs:
      - generate-execution-report

edges:
  # Brainstorm → minimal task planning → implementation
  - from: brainstorm
    to: task-planning

  - from: task-planning
    to: execute-tasks

  - from: execute-tasks
    to: code-review
    condition: completed

  - from: execute-tasks
    to: escalate
    condition: failed

  # Code Review — only 1 round, then escalate
  - from: code-review
    to: execute-tasks
    condition: rejected

  - from: code-review
    to: escalate
    condition: max_rounds_exceeded

  - from: code-review
    to: unit-testing
    condition: approved

  # Unit Testing — no QA for hotfixes
  - from: unit-testing
    to: docs-update
    condition: passed

  - from: unit-testing
    to: bug-fixing
    condition: failed

  - from: bug-fixing
    to: code-review

  # Docs Update → Create PR
  - from: docs-update
    to: create-pr
    condition: completed

  - from: docs-update
    to: create-pr
    condition: skipped

  - from: docs-update
    to: create-pr
    condition: failed

  # PR → Post-mortem → Done
  - from: create-pr
    to: post-mortem

  - from: post-mortem
    to: done
