name: refactor
version: 2
description: Workflow for refactoring tasks — full planning, performance analysis, but no visual QA testing

defaults:
  max_review_rounds: 3
  timeout: 30m

nodes:
  brainstorm:
    agent: tech-leader
    action: brainstorm
    description: Analyze what needs refactoring and why
    produces: brainstorm.md

  plan:
    agent: product-planner
    action: create-plan
    description: Plan the refactoring approach and scope
    produces: plan.md
    consumes:
      - brainstorm.md

  review-plan:
    agent: tech-leader
    action: review
    target: plan.md
    max_rounds: 3

  architecture:
    agent: architect
    action: create-spec
    description: Define the refactoring spec — before/after structure
    produces: spec.md
    consumes:
      - plan.md
      - brainstorm.md

  review-spec:
    agent: tech-leader
    action: review
    target: spec.md
    max_rounds: 3

  task-planning:
    agent: project-manager
    action: create-tasks
    description: Break refactoring into safe incremental steps
    produces: tasks.md
    consumes:
      - plan.md
      - spec.md

  execute-tasks:
    agent: project-manager
    action: dispatch-tasks
    description: Dispatch refactoring tasks (parallel where safe)
    parallel: true
    consumes:
      - tasks.md
      - spec.md

  code-review:
    agent: code-reviewer
    action: review-code
    max_rounds: 3

  perf-analysis:
    agent: perf-analyzer
    action: analyze-perf
    description: Verify refactoring improved (or didn't regress) performance
    produces: perf-report.md
    consumes:
      - spec.md
      - tasks.md
    skip_if:
      - tag: no-perf

  unit-testing:
    agent: unit-tester
    action: run-tests
    produces: test-report-unit.md

  bug-fixing:
    agent: tech-leader
    action: dispatch-fixes
    description: Fix regressions from refactoring
    consumes:
      - test-report-unit.md

  docs-update:
    agent: docs-writer
    action: update-docs
    description: Update docs and changelog for refactoring changes
    produces: docs-update.md
    consumes:
      - plan.md
      - spec.md
      - tasks.md
      - test-report-unit.md
    skip_if:
      - tag: no-docs

  create-pr:
    agent: tech-leader
    action: create-pr
    description: Create PR for the refactoring

  post-mortem:
    agent: tech-leader
    action: post-mortem
    description: Generate metrics and lessons learned
    produces: post-mortem.md

edges:
  - from: brainstorm
    to: plan

  - from: plan
    to: review-plan

  - from: review-plan
    to: plan
    condition: rejected

  - from: review-plan
    to: escalate
    condition: max_rounds_exceeded

  - from: review-plan
    to: architecture
    condition: approved

  - from: architecture
    to: review-spec

  - from: review-spec
    to: architecture
    condition: rejected

  - from: review-spec
    to: escalate
    condition: max_rounds_exceeded

  - from: review-spec
    to: task-planning
    condition: approved

  # Skip brainstorm-refinement for refactors (spec IS the refinement)
  - from: task-planning
    to: execute-tasks

  - from: execute-tasks
    to: code-review

  - from: code-review
    to: execute-tasks
    condition: rejected

  - from: code-review
    to: perf-analysis
    condition: approved

  # Performance Analysis → Unit Testing (unconditional — warnings don't block)
  - from: perf-analysis
    to: unit-testing

  - from: perf-analysis
    to: unit-testing
    condition: skipped

  # No QA testing for refactors — only unit tests
  - from: unit-testing
    to: docs-update
    condition: passed

  - from: unit-testing
    to: bug-fixing
    condition: failed

  - from: bug-fixing
    to: code-review

  # Docs Update → Create PR
  - from: docs-update
    to: create-pr

  - from: docs-update
    to: create-pr
    condition: skipped

  # PR → Post-mortem → Done
  - from: create-pr
    to: post-mortem

  - from: post-mortem
    to: done
