name: refactor
version: 1
description: Workflow for refactoring tasks — full planning but no visual QA testing

defaults:
  max_review_rounds: 3
  timeout: 30m

nodes:
  brainstorm:
    agent: tech-leader
    action: brainstorm
    description: Analyze what needs refactoring and why
    produces: brainstorm.md

  plan:
    agent: product-planner
    action: create-plan
    description: Plan the refactoring approach and scope
    produces: plan.md
    consumes:
      - brainstorm.md

  review-plan:
    agent: tech-leader
    action: review
    target: plan.md
    max_rounds: 3

  architecture:
    agent: architect
    action: create-spec
    description: Define the refactoring spec — before/after structure
    produces: spec.md
    consumes:
      - plan.md
      - brainstorm.md

  review-spec:
    agent: tech-leader
    action: review
    target: spec.md
    max_rounds: 3

  task-planning:
    agent: project-manager
    action: create-tasks
    description: Break refactoring into safe incremental steps
    produces: tasks.md
    consumes:
      - plan.md
      - spec.md

  execute-tasks:
    agent: project-manager
    action: dispatch-tasks
    description: Dispatch refactoring tasks (parallel where safe)
    parallel: true
    consumes:
      - tasks.md
      - spec.md

  code-review:
    agent: code-reviewer
    action: review-code
    max_rounds: 3

  unit-testing:
    agent: unit-tester
    action: run-tests
    produces: test-report-unit.md

  bug-fixing:
    agent: tech-leader
    action: dispatch-fixes
    description: Fix regressions from refactoring
    consumes:
      - test-report-unit.md

  create-pr:
    agent: tech-leader
    action: create-pr
    description: Create PR for the refactoring

  post-mortem:
    agent: tech-leader
    action: post-mortem
    description: Generate metrics and lessons learned
    produces: post-mortem.md

edges:
  - from: brainstorm
    to: plan

  - from: plan
    to: review-plan

  - from: review-plan
    to: plan
    condition: rejected

  - from: review-plan
    to: escalate
    condition: max_rounds_exceeded

  - from: review-plan
    to: architecture
    condition: approved

  - from: architecture
    to: review-spec

  - from: review-spec
    to: architecture
    condition: rejected

  - from: review-spec
    to: escalate
    condition: max_rounds_exceeded

  - from: review-spec
    to: task-planning
    condition: approved

  # Skip brainstorm-refinement for refactors (spec IS the refinement)
  - from: task-planning
    to: execute-tasks

  - from: execute-tasks
    to: code-review

  - from: code-review
    to: execute-tasks
    condition: rejected

  - from: code-review
    to: unit-testing
    condition: approved

  # No QA testing for refactors — only unit tests
  - from: unit-testing
    to: create-pr
    condition: passed

  - from: unit-testing
    to: bug-fixing
    condition: failed

  - from: bug-fixing
    to: code-review

  # PR → Post-mortem → Done
  - from: create-pr
    to: post-mortem

  - from: post-mortem
    to: done
